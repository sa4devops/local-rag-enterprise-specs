<svg viewBox="0 0 1120 900" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#475569"/></marker>
    <marker id="ad" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="0" y="0" width="1120" height="900" fill="#ffffff"/>
  <text x="560" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">Agent Architecture — Governed Request Flow</text>
  <text x="560" y="56" text-anchor="middle" font-size="12" fill="#64748b">Permission gate BEFORE retrieval · LLM processes only agent-fetched data · No-Guessing Guard</text>

  <rect x="20" y="84" width="1080" height="728" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="9 6"/>

  <!-- Left: LLM Gateway -->
  <rect x="40" y="356" width="210" height="76" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="145" y="384" text-anchor="middle" font-size="12" font-weight="700" fill="#831843">LLM Gateway</text>
  <text x="145" y="401" text-anchor="middle" font-size="9.5" fill="#be185d">Ollama / vLLM</text>
  <text x="145" y="416" text-anchor="middle" font-size="9" fill="#be185d">per-agent model/provider (platform_db)</text>
  <line x1="250" y1="386" x2="280" y2="386" stroke="#db2777" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- Right: Audit -->
  <rect x="850" y="228" width="240" height="560" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="970" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Audit Log</text>
  <text x="970" y="470" text-anchor="middle" font-size="10.5" fill="#475569">records every stage</text>
  <text x="970" y="488" text-anchor="middle" font-size="10.5" fill="#475569">+ permission decision</text>
  <text x="970" y="506" text-anchor="middle" font-size="10.5" fill="#475569">(allow / deny + policy)</text>

  <!-- Center flow -->
  <!-- S1 -->
  <rect x="280" y="100" width="540" height="44" rx="9" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="550" y="127" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0c4a6e">User Request — Enterprise UI</text>
  <!-- S2 -->
  <rect x="280" y="164" width="540" height="44" rx="9" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="550" y="191" text-anchor="middle" font-size="12.5" font-weight="700" fill="#4c1d95">Backend API — Authenticate + coarse RBAC</text>
  <!-- S3 Orchestrator -->
  <rect x="280" y="228" width="540" height="92" rx="9" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="550" y="250" text-anchor="middle" font-size="12.5" font-weight="700" fill="#92400e">Orchestrator / Router</text>
  <g font-size="9.5" font-weight="600" fill="#92400e" text-anchor="middle">
    <rect x="292" y="270" width="123" height="42" rx="6" fill="#fff" stroke="#fcd34d"/><text x="353" y="290">Classify</text><text x="353" y="303" font-size="8">request type</text>
    <rect x="423" y="270" width="123" height="42" rx="6" fill="#fff" stroke="#fcd34d"/><text x="484" y="290">Context Build</text><text x="484" y="303" font-size="8">identity·perms·OKF</text>
    <rect x="554" y="270" width="123" height="42" rx="6" fill="#fde68a" stroke="#d97706"/><text x="615" y="290">Permission Gate</text><text x="615" y="303" font-size="8">default-deny</text>
    <rect x="685" y="270" width="123" height="42" rx="6" fill="#fff" stroke="#fcd34d"/><text x="746" y="290">No-Guessing</text><text x="746" y="303" font-size="8">guard</text>
  </g>
  <!-- S4 Agents -->
  <rect x="280" y="340" width="540" height="92" rx="9" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="550" y="360" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Agents — fetch WITHIN permission</text>
  <g font-size="9.5" font-weight="600" fill="#14532d" text-anchor="middle">
    <rect x="292" y="378" width="123" height="46" rx="6" fill="#fff" stroke="#86efac"/><text x="353" y="399">Retrieval</text><text x="353" y="412" font-size="8">vector+text → rerank</text>
    <rect x="423" y="378" width="123" height="46" rx="6" fill="#fff" stroke="#86efac"/><text x="484" y="399">SQL (read-only)</text><text x="484" y="412" font-size="8">schema + RLS</text>
    <rect x="554" y="378" width="123" height="46" rx="6" fill="#fff" stroke="#86efac"/><text x="615" y="399">API-Integration</text><text x="615" y="412" font-size="8">MCP · approval gate</text>
    <rect x="685" y="378" width="123" height="46" rx="6" fill="#fff" stroke="#86efac"/><text x="746" y="399">OCR / Doc</text><text x="746" y="412" font-size="8">Whisper audio</text>
  </g>
  <!-- S5 Sources -->
  <rect x="280" y="452" width="540" height="64" rx="9" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <text x="550" y="471" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1e293b">Sources of Truth</text>
  <g font-size="9.5" font-weight="600" fill="#1e293b" text-anchor="middle">
    <rect x="292"   y="480" width="98" height="28" rx="6" fill="#fff" stroke="#cbd5e1"/><text x="341"   y="498">PostgreSQL</text>
    <rect x="396.5" y="480" width="98" height="28" rx="6" fill="#fff" stroke="#cbd5e1"/><text x="445.5" y="498">Qdrant</text>
    <rect x="501"   y="480" width="98" height="28" rx="6" fill="#fff" stroke="#cbd5e1"/><text x="550"   y="498">OpenSearch</text>
    <rect x="605.5" y="480" width="98" height="28" rx="6" fill="#fff" stroke="#cbd5e1"/><text x="654.5" y="498">MinIO</text>
    <rect x="710"   y="480" width="98" height="28" rx="6" fill="#fff" stroke="#cbd5e1"/><text x="759"   y="498">Internal APIs</text>
  </g>
  <!-- S6 Validation -->
  <rect x="280" y="536" width="540" height="48" rx="9" fill="#fae8ff" stroke="#a21caf" stroke-width="1.5"/>
  <text x="550" y="565" text-anchor="middle" font-size="11.5" font-weight="700" fill="#701a75">Validation Agent — grounded? citations? classification enforced</text>
  <!-- S7 Reasoning -->
  <rect x="280" y="604" width="540" height="48" rx="9" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="550" y="633" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1e3a8a">Reasoning / Report — compose ONLY from fetched data · sectioned</text>
  <!-- S8 Security gate -->
  <rect x="280" y="672" width="540" height="48" rx="9" fill="#ffe4e6" stroke="#e11d48" stroke-width="1.5"/>
  <text x="550" y="701" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9f1239">Security / Policy + Human-in-the-loop gate (state-changing)</text>
  <!-- S9 Answer -->
  <rect x="280" y="740" width="540" height="48" rx="9" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5"/>
  <text x="550" y="769" text-anchor="middle" font-size="12" font-weight="700" fill="#134e4a">Answer + provenance → User</text>

  <!-- center arrows -->
  <g stroke="#475569" stroke-width="1.8">
    <line x1="550" y1="145" x2="550" y2="163" marker-end="url(#a)"/>
    <line x1="550" y1="209" x2="550" y2="227" marker-end="url(#a)"/>
    <line x1="550" y1="321" x2="550" y2="339" marker-end="url(#a)"/>
    <line x1="550" y1="433" x2="550" y2="451" marker-end="url(#a)"/>
    <line x1="550" y1="517" x2="550" y2="535" marker-end="url(#a)"/>
    <line x1="550" y1="585" x2="550" y2="603" marker-end="url(#a)"/>
    <line x1="550" y1="653" x2="550" y2="671" marker-end="url(#a)"/>
    <line x1="550" y1="721" x2="550" y2="739" marker-end="url(#a)"/>
  </g>
  <text x="560" y="335" font-size="9" fill="#d97706">authorized scope only</text>

  <!-- audit dashed arrows -->
  <g stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3">
    <line x1="820" y1="186" x2="850" y2="300" marker-end="url(#ad)"/>
    <line x1="820" y1="296" x2="850" y2="340" marker-end="url(#ad)"/>
    <line x1="820" y1="404" x2="850" y2="420" marker-end="url(#ad)"/>
    <line x1="820" y1="560" x2="850" y2="540" marker-end="url(#ad)"/>
    <line x1="820" y1="696" x2="850" y2="620" marker-end="url(#ad)"/>
  </g>

  <text x="20" y="838" font-size="11" font-weight="600" fill="#334155">If evidence is missing or permission is limited → "insufficient authorized data" (No-Guessing) instead of hallucinating. Truth = DB · approved docs · internal APIs · official records.</text>
</svg>
