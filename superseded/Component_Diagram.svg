<svg viewBox="0 0 1160 900" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#475569"/></marker>
  </defs>
  <rect x="0" y="0" width="1160" height="900" fill="#ffffff"/>
  <text x="580" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">Component Diagram — Air-Gapped Enterprise Platform</text>
  <text x="580" y="56" text-anchor="middle" font-size="12" fill="#64748b">Single portable codebase · stateless services · permission checked before retrieval</text>

  <rect x="20" y="76" width="1120" height="770" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="9 6"/>

  <!-- Cross-cutting -->
  <rect x="858" y="100" width="282" height="732" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="999" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Cross-Cutting (Always-On)</text>
  <g font-size="12.5" font-weight="700" fill="#1e293b" text-anchor="middle">
    <rect x="870" y="144" width="258" height="88" rx="9" fill="#fff" stroke="#cbd5e1"/><text x="999" y="193">Audit Log</text>
    <rect x="870" y="256" width="258" height="88" rx="9" fill="#fff" stroke="#cbd5e1"/><text x="999" y="305">Cache (speed only)</text>
    <rect x="870" y="368" width="258" height="88" rx="9" fill="#fff" stroke="#cbd5e1"/><text x="999" y="411">Monitoring</text><text x="999" y="429" font-size="9.5" font-weight="400" fill="#64748b">Prometheus · Grafana · Loki</text>
    <rect x="870" y="480" width="258" height="88" rx="9" fill="#fff" stroke="#cbd5e1"/><text x="999" y="529">License (offline)</text>
    <rect x="870" y="592" width="258" height="88" rx="9" fill="#fff" stroke="#cbd5e1"/><text x="999" y="641">Hardware &amp; Runtime Mgr</text>
    <rect x="870" y="704" width="258" height="88" rx="9" fill="#fff" stroke="#cbd5e1"/><text x="999" y="753">Security &amp; Policy</text>
  </g>

  <!-- R1 UI -->
  <rect x="60" y="100" width="770" height="96" rx="11" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="76" y="120" font-size="13" font-weight="700" fill="#0c4a6e">Enterprise UI (Web) — Arabic / English · RTL · White-label</text>
  <g font-size="11" font-weight="600" fill="#0c4a6e" text-anchor="middle">
    <rect x="72"  y="130" width="142" height="52" rx="8" fill="#fff" stroke="#7dd3fc"/><text x="143" y="160">Admin Console</text>
    <rect x="223" y="130" width="142" height="52" rx="8" fill="#fff" stroke="#7dd3fc"/><text x="294" y="160">User Workspace</text>
    <rect x="374" y="130" width="142" height="52" rx="8" fill="#fff" stroke="#7dd3fc"/><text x="445" y="160">Screen Renderer</text>
    <rect x="525" y="130" width="142" height="52" rx="8" fill="#fff" stroke="#7dd3fc"/><text x="596" y="160">Chat (optional)</text>
    <rect x="676" y="130" width="142" height="52" rx="8" fill="#fff" stroke="#7dd3fc"/><text x="747" y="157">i18n / RTL</text><text x="747" y="171" font-size="9">White-label</text>
  </g>

  <!-- R2 Backend -->
  <rect x="60" y="214" width="770" height="150" rx="11" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="76" y="234" font-size="13" font-weight="700" fill="#4c1d95">Backend API (FastAPI · Stateless)</text>
  <g font-size="10" font-weight="600" fill="#4c1d95" text-anchor="middle">
    <rect x="72"  y="240" width="176" height="32" rx="7" fill="#fff" stroke="#c4b5fd"/><text x="160" y="260">Auth &amp; Session</text>
    <rect x="262" y="240" width="176" height="32" rx="7" fill="#fff" stroke="#c4b5fd"/><text x="350" y="260">Authorization (Perm Engine)</text>
    <rect x="452" y="240" width="176" height="32" rx="7" fill="#fff" stroke="#c4b5fd"/><text x="540" y="260">Metadata Service</text>
    <rect x="642" y="240" width="176" height="32" rx="7" fill="#fff" stroke="#c4b5fd"/><text x="730" y="260">Records / CRUD</text>
    <rect x="72"  y="278" width="176" height="32" rx="7" fill="#fff" stroke="#c4b5fd"/><text x="160" y="298">Migration/Gen Pipeline</text>
    <rect x="262" y="278" width="176" height="32" rx="7" fill="#fff" stroke="#c4b5fd"/><text x="350" y="298">Audit Service</text>
    <rect x="452" y="278" width="176" height="32" rx="7" fill="#fff" stroke="#c4b5fd"/><text x="540" y="298">Integration Admin</text>
    <rect x="642" y="278" width="176" height="32" rx="7" fill="#fff" stroke="#c4b5fd"/><text x="730" y="298">App Store Service</text>
    <rect x="72"  y="316" width="176" height="32" rx="7" fill="#fff" stroke="#c4b5fd"/><text x="160" y="336">Reports Service</text>
    <rect x="262" y="316" width="176" height="32" rx="7" fill="#fff" stroke="#c4b5fd"/><text x="350" y="336">Config / Profile Loader</text>
    <rect x="452" y="316" width="176" height="32" rx="7" fill="#fff" stroke="#c4b5fd"/><text x="540" y="336">LLM Gateway Client</text>
  </g>

  <!-- R3 Workers -->
  <rect x="60" y="382" width="770" height="120" rx="11" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="76" y="402" font-size="13" font-weight="700" fill="#14532d">Worker Layer (scalable) — Orchestrator + Agents</text>
  <rect x="72" y="408" width="746" height="34" rx="7" fill="#fff" stroke="#86efac"/>
  <text x="445" y="429" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">Orchestrator / Router — Classifier · Context Builder · Permission Gate · No-Guessing Guard</text>
  <g font-size="9" font-weight="600" fill="#14532d" text-anchor="middle">
    <rect x="72"    y="450" width="78" height="34" rx="6" fill="#fff" stroke="#86efac"/><text x="111"   y="471">Retrieval</text>
    <rect x="155.5" y="450" width="78" height="34" rx="6" fill="#fff" stroke="#86efac"/><text x="194.5" y="471">SQL</text>
    <rect x="239"   y="450" width="78" height="34" rx="6" fill="#fff" stroke="#86efac"/><text x="278"   y="471">Validation</text>
    <rect x="322.5" y="450" width="78" height="34" rx="6" fill="#fff" stroke="#86efac"/><text x="361.5" y="471">Reasoning</text>
    <rect x="406"   y="450" width="78" height="34" rx="6" fill="#fff" stroke="#86efac"/><text x="445"   y="471">Sec/Policy</text>
    <rect x="489.5" y="450" width="78" height="34" rx="6" fill="#fff" stroke="#86efac"/><text x="528.5" y="471">OCR/Doc</text>
    <rect x="573"   y="450" width="78" height="34" rx="6" fill="#fff" stroke="#86efac"/><text x="612"   y="471">API-Integr.</text>
    <rect x="656.5" y="450" width="78" height="34" rx="6" fill="#fff" stroke="#86efac"/><text x="695.5" y="471">Report</text>
    <rect x="740"   y="450" width="78" height="34" rx="6" fill="#fff" stroke="#86efac"/><text x="779"   y="471">Admin/Meta</text>
  </g>

  <!-- R4 LLM Gateway -->
  <rect x="60" y="520" width="770" height="70" rx="11" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <rect x="72" y="534" width="746" height="44" rx="8" fill="#fff" stroke="#f9a8d4"/>
  <text x="445" y="555" text-anchor="middle" font-size="13" font-weight="700" fill="#831843">LLM Gateway → Ollama / vLLM</text>
  <text x="445" y="571" text-anchor="middle" font-size="9.5" fill="#be185d">per-agent model / provider from platform_db (change without code)</text>

  <!-- R5 Data Plane -->
  <rect x="60" y="608" width="770" height="120" rx="11" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <text x="76" y="628" font-size="13" font-weight="700" fill="#1e293b">Data Plane</text>
  <g font-size="10.5" font-weight="600" fill="#1e293b" text-anchor="middle">
    <rect x="72"  y="636" width="142" height="36" rx="7" fill="#fff" stroke="#cbd5e1"/><text x="143" y="659">platform_db</text>
    <rect x="223" y="636" width="142" height="36" rx="7" fill="#fff" stroke="#cbd5e1"/><text x="294" y="653">apps_db</text><text x="294" y="666" font-size="8" font-weight="400" fill="#64748b">schema-per-app</text>
    <rect x="374" y="636" width="142" height="36" rx="7" fill="#fff" stroke="#cbd5e1"/><text x="445" y="659">integration_db</text>
    <rect x="525" y="636" width="142" height="36" rx="7" fill="#fff" stroke="#cbd5e1"/><text x="596" y="659">reporting_db</text>
    <rect x="676" y="636" width="142" height="36" rx="7" fill="#fff" stroke="#cbd5e1"/><text x="747" y="659">Qdrant</text>
    <rect x="72"  y="678" width="176" height="36" rx="7" fill="#fff" stroke="#cbd5e1"/><text x="160" y="701">OpenSearch</text>
    <rect x="262" y="678" width="176" height="36" rx="7" fill="#fff" stroke="#cbd5e1"/><text x="350" y="701">MinIO</text>
    <rect x="452" y="678" width="176" height="36" rx="7" fill="#fff" stroke="#cbd5e1"/><text x="540" y="701">Redis (cache + queue)</text>
    <rect x="642" y="678" width="176" height="36" rx="7" fill="#fff" stroke="#cbd5e1"/><text x="730" y="701">Neo4j (opt)</text>
  </g>

  <!-- R6 Connectors -->
  <rect x="60" y="746" width="770" height="86" rx="11" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  <rect x="72" y="772" width="420" height="48" rx="8" fill="#fff" stroke="#fdba74"/>
  <text x="282" y="794" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">Connectors</text>
  <text x="282" y="811" text-anchor="middle" font-size="9.5" fill="#c2410c">MCP · Internal API · Webhook · DB Connector</text>
  <rect x="508" y="772" width="310" height="48" rx="8" fill="#fff" stroke="#fdba74"/>
  <text x="663" y="800" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">Internal Enterprise Systems</text>
  <line x1="492" y1="796" x2="508" y2="796" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- vertical connectors -->
  <g stroke="#475569" stroke-width="1.8">
    <line x1="445" y1="197" x2="445" y2="213" marker-end="url(#a)"/>
    <line x1="445" y1="365" x2="445" y2="381" marker-end="url(#a)"/>
    <line x1="445" y1="503" x2="445" y2="519" marker-end="url(#a)"/>
    <line x1="445" y1="591" x2="445" y2="607" marker-end="url(#a)"/>
    <line x1="445" y1="729" x2="445" y2="745" marker-end="url(#a)"/>
  </g>
  <text x="455" y="376" font-size="9" fill="#16a34a">task queue via Redis</text>

  <text x="20" y="872" font-size="11" font-weight="600" fill="#334155">Every request: Backend → Orchestrator (Permission Gate BEFORE retrieval) → Agents fetch within permission → LLM processes only agent-fetched data → Audit. Critical ops re-verify live.</text>
</svg>
